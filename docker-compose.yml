version: "3.8"

services:
  firefly-iii:
    # Assumindo que Firefly III já está rodando
    # Este serviço é referenciado apenas para confirmação
    container_name: firefly-iii
    image: fireflyiii/core:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_CONNECTION: sqlite
      DB_PATH: /data
      TRUSTED_PROXIES: "**"
      APP_KEY: ${APP_KEY:-base64:somerandomkeyherefordev}
    volumes:
      - ${EXTERNAL_MOUNT:-/mnt/external}/firefly:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - jarvis

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    mem_limit: "1g"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REFRESH_TOKEN=${GOOGLE_REFRESH_TOKEN}
      - FIREFLY_URL=http://firefly-iii:8080
      - FIREFLY_TOKEN=${FIREFLY_TOKEN}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - SERP_API_KEY=${SERP_API_KEY}
    volumes:
      - ./config/openclaw:/home/node/.openclaw
      - ${EXTERNAL_MOUNT:-/mnt/external}:/mnt/external
    ports:
      - "127.0.0.1:18789:18789"
    depends_on:
      firefly-iii:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:18789/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - jarvis

  mcporter:
    image: steipete/mcporter:latest
    container_name: mcporter-firefly
    restart: unless-stopped
    mem_limit: "128m"
    environment:
      - MCPORTER_DEBUG=false
    volumes:
      - ./skills/firefly-mcp/mcporter.json:/config/mcporter.json
    command: mcporter --config /config/mcporter.json
    depends_on:
      firefly-iii:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "test", "-f", "/config/mcporter.json"]
      interval: 60s
      timeout: 10s
      retries: 3
    networks:
      - jarvis

  scheduler:
    image: alpine:3.19
    container_name: jarvis-scheduler
    restart: unless-stopped
    mem_limit: "256m"
    environment:
      # Passed so scripts inside cron jobs can authenticate without local installs
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - FIREFLY_TOKEN=${FIREFLY_TOKEN}
      - EXTERNAL_MOUNT=${EXTERNAL_MOUNT:-/mnt/external}
    volumes:
      - ./config/crontabs:/etc/crontabs
      - ./scripts:/app/scripts
      - ./pipeline:/app/pipeline
      - ./config:/app/config
      - ${EXTERNAL_MOUNT:-/mnt/external}:/mnt/external
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      sh -c "
        apk add --no-cache
          dcron bash curl git git-crypt
          sqlite jq logrotate
          github-cli
          python3 py3-pip &&
        pip3 install --no-cache-dir --quiet requests &&
        cp /etc/crontabs/jarvis /var/spool/cron/crontabs/root &&
        crond -f -l 2
      "
    depends_on:
      openclaw:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "test", "-f", "/var/spool/cron/crontabs/root"]
      interval: 60s
      timeout: 10s
      retries: 3
    networks:
      - jarvis

  # 5/5 containers — Art. VII.2 (Constitution) limit exactly reached; no new services without removal
  mcp-airbnb:
    image: node:20-alpine
    container_name: mcp-airbnb
    restart: unless-stopped
    mem_limit: "200m"
    # robots.txt compliance active by default (no --ignore-robots-txt arg)
    # If airbnb_search returns empty results in smoke test, add "--ignore-robots-txt" to command
    command: sh -c "npx -y @openbnb/mcp-server-airbnb"
    depends_on:
      openclaw:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "pgrep node || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - jarvis

networks:
  jarvis:
    driver: bridge
