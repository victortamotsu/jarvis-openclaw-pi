/mnt/external/logs/openclaw/*.log {
    daily
    rotate 90
    dateext
    dateformat -%Y%m%d
    compress
    delaycompress
    notifempty
    missingok
    create 0640 pi pi
    sharedscripts
    postrotate
        docker-compose -f /home/pi/jarvis-openclaw-pi/docker-compose.yml kill -s SIGHUP openclaw 2>/dev/null || true
    endscript
}

